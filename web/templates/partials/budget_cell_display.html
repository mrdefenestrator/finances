{# Single budget cell in display mode; click to edit (HTMX). focus_next=true when returning from save/collapse. #}
<td class="px-1.5 py-0.5 border-r border-gray-100 dark:border-gray-700 last:border-r-0 {% if right_align %}text-right tabular-nums{% endif %} {% if value is not none and value | display_is_negative %}text-red-600 dark:text-red-400{% endif %} cursor-pointer hover:bg-blue-50 dark:hover:bg-blue-900/20"
    {% if focus_next %}data-focus-next="{{ focus_next }}" {% endif %}
    hx-get="{{ url_for('budget.cell_edit', filename=filename, index=index, field=field) }}" hx-trigger="click"
    hx-swap="outerHTML" role="button" tabindex="0" title="Click to edit (Tab/Enter/Esc)">
    {{ value }}
</td>
