# Finances Tracker — YAML data model
# Aligns with DESIGN.md: accounts, scheduled income and expenses,
# non-liquid assets, debts. One document = one snapshot (e.g. household).

title: finances
type: object
additionalProperties: false
properties:
  $schema:
    type: string
    description: Optional local reference to this schema (e.g. ../schema.yaml).
  accounts:
    type: array
    description: >
      Monetary balances (bank accounts, loans, wallets, apps). Type determines
      inclusion in liquid total (1) and credit-card adjustment (2).
    items:
      oneOf:
        - title: creditCardAccount
          type: object
          properties:
            id:
              type: integer
              description: Unique identifier (incrementing integer). Referenced by income/expense autoAccountRef.
            name:
              type: string
              description: Short label (e.g. "Amex", "Chase Sapphire")
            type:
              type: string
              enum: [credit_card]
              description: >
                credit_card → debt subtracted in accounts total (2); balance (owed) = limit - available.
            limit:
              type: number
              description: >
                The card's credit limit. Required for credit_card together with available.
            available:
              type: number
              description: >
                Available credit. Required for credit_card together with limit.
            rewards_balance:
              type: number
              description: Optional. Rewards points or cash-back balance.
            statement_balance:
              type: number
              description: Optional. Current statement balance (amount due on statement).
            statement_due_day_of_month:
              type: integer
              minimum: 1
              maximum: 31
              description: Optional. Day of month (1–31) the statement is due.
            paymentAccountRef:
              type: integer
              description: Optional. Account id from which this credit card's balance is automatically paid.
            asOfDate:
              type: string
              format: ISO8601
              description: Optional date as of which balance was recorded.
            institution:
              type: string
              description: Optional (e.g. bank name)
            partial_account_number:
              type: string
              description: Optional. When present, displayed after the account name (e.g. last 4 digits).
          required:
            - id
            - name
            - type
            - limit
            - available
          additionalProperties: false

        - title: otherAccount
          type: object
          properties:
            id:
              type: integer
              description: Unique identifier (incrementing integer). Referenced by income/expense autoAccountRef.
            name:
              type: string
              description: Short label (e.g. "Checking", "Savings")
            type:
              type: string
              enum: [checking, savings, gift_card, wallet, digital_wallet, loan, other]
              description: >
                Specific account kind. checking, savings, gift_card, wallet, digital_wallet → liquid
                (included in (1) and (2)); loan, other → other (not in (1) or (2)).
            balance:
              type: number
              description: Current balance.
            minimum_balance:
              type: number
              description: Optional. Target or floor balance to maintain (e.g. for checking/savings).
            asOfDate:
              type: string
              format: ISO8601
              description: Optional date as of which balance was recorded.
            institution:
              type: string
              description: Optional (e.g. bank name, "Cash")
            partial_account_number:
              type: string
              description: Optional. When present, displayed after the account name (e.g. last 4 digits).
          required:
            - id
            - name
            - type
            - balance
          additionalProperties: false

  budget:
    type: array
    description: >
      Scheduled income and expenses. kind field distinguishes each entry.
      Once real, reflected in account balances; no separate transaction log.
    items:
      oneOf:
        - title: incomeEntry
          type: object
          properties:
            kind:
              enum: [income]
              description: "Whether this entry is income."
            description:
              type: string
              description: Label (e.g. "Salary", "Tax Refund")
            type:
              type: string
              enum: [salary, refund, bonus, remittance]
              description: Optional. Category of income.
            amount:
              type: number
            recurrence:
              type: string
              enum: [one_time, monthly, biweekly, quarterly, semiannual, annual]
            date:
              type: string
              format: ISO8601
              description: For one_time, the date of the payment.
            dayOfMonth:
              type: integer
              minimum: 1
              maximum: 31
              description: "For monthly, quarterly, semiannual: day of month (1–31). For annual use dayOfYear."
            month:
              type: integer
              minimum: 1
              maximum: 12
              description: "For quarterly, semiannual, annual: month (1–12)."
            dayOfYear:
              type: integer
              minimum: 1
              maximum: 31
              description: For annual, day of month (optional; dayOfMonth also accepted).
            autoAccountRef:
              type: integer
              description: Optional. Account id where this income is deposited (e.g. direct deposit).
          required:
            - kind
            - description
            - amount
            - recurrence
          additionalProperties: false

        - title: expenseEntry
          type: object
          properties:
            kind:
              enum: [expense]
              description: "Whether this entry is an expense."
            description:
              type: string
              description: Label (e.g. "Rent", "Groceries")
            type:
              type: string
              enum: [housing, insurance, service, utility, product, transport, food]
              description: Optional. Category of expense.
            amount:
              type: number
            recurrence:
              type: string
              enum: [one_time, monthly, biweekly, quarterly, semiannual, annual]
            date:
              type: string
              format: ISO8601
              description: For one_time, the date of the expense.
            dayOfMonth:
              type: integer
              minimum: 1
              maximum: 31
              description: "For monthly, quarterly, semiannual: day of month (1–31). For annual use dayOfYear."
            month:
              type: integer
              minimum: 1
              maximum: 12
              description: "For quarterly, semiannual, annual: month (1–12)."
            dayOfYear:
              type: integer
              minimum: 1
              maximum: 31
              description: For annual, day of month (optional; dayOfMonth also accepted).
            continuous:
              type: boolean
              default: false
              description: >
                If true with monthly recurrence, amount is prorated by the proportion
                of the month remaining (for projection to EOM). Use for items like
                food or gas that are spent over the month rather than on a fixed day.
            autoAccountRef:
              type: integer
              description: Optional. Account id where this expense is paid (e.g. autopay).
          required:
            - kind
            - description
            - amount
            - recurrence
          additionalProperties: false

  assets:
    type: array
    description: >
      Non-liquid assets and debts, unified by a kind field. Assets have estimated
      value; debts have a balance owed. Debts may link to assets via assetRef = asset.id.
      Used for (5) and (6).
    items:
      oneOf:
        - title: assetEntry
          type: object
          properties:
            kind:
              enum: [asset]
              description: "Whether this entry is an asset."
            id:
              type: integer
              description: Unique identifier (incrementing integer). Required for asset entries; referenced by debt assetRef.
            name:
              type: string
              description: Unique label (e.g. "Primary residence").
            value:
              type: number
              description: Estimated value from authoritative source (per unit when quantity is used).
            quantity:
              type: number
              description: Optional. Number of units; default 1. Subtotal = value × quantity.
            institution:
              type: string
              description: Optional (e.g. brokerage, "Personal").
            source:
              type: string
              description: Optional (e.g. "Zillow", "KBB", "Manual").
            asOfDate:
              type: string
              format: ISO8601
              description: Optional; date as of which value was recorded.
          required:
            - kind
            - name
          additionalProperties: false

        - title: debtEntry
          type: object
          properties:
            kind:
              enum: [debt]
              description: "Whether this entry is a debt."
            name:
              type: string
              description: Unique label (e.g. "Mortgage", "Car Loan").
            balance:
              type: number
              description: Current balance owed (positive); per unit when quantity is used. Subtotal = balance × quantity.
            quantity:
              type: number
              description: Optional. Number of units; default 1.
            institution:
              type: string
              description: Optional (e.g. bank name, lender name).
            assetRef:
              type: integer
              description: Optional. Id of the asset this loan is secured by (must match an asset entry id).
            interestRate:
              type: number
              description: Optional. Annual interest rate as decimal (e.g. 0.05 for 5%).
            nextDueDate:
              type: string
              format: ISO8601
              description: Optional. Next payment due date.
            asOfDate:
              type: string
              format: ISO8601
              description: Optional; date as of which balance was recorded.
          required:
            - kind
            - name
          additionalProperties: false

required:
  - accounts
  - budget
  - assets
