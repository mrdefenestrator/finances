[tools]
uv = "latest"

[tasks.setup]
run = "uv sync"
description = "Install all dependencies into .venv"

[tasks.format]
run = "uv run ruff format *.py finances/ tests/ web/"
description = "Format code with ruff"

[tasks.format-check]
run = "uv run ruff format --check *.py finances/ tests/ web/"
description = "Check code formatting"

[tasks.lint]
run = "uv run ruff check *.py finances/ tests/ web/"
description = "Lint with ruff"

[tasks.lint-fix]
run = "uv run ruff check --fix *.py finances/ tests/ web/"
description = "Fix lint issues with ruff"

[tasks.validate]
run = "uv run python validate_yaml.py"
description = "Validate finances YAML files against schema"

[tasks.ci]
depends = ["format-check", "lint", "validate", "test", "test-e2e"]
description = "Run all CI checks"

[tasks.test]
run = "uv run pytest tests/ -v --cov=finances --cov-report=term-missing -m 'not e2e'"
description = "Run tests with coverage (excludes e2e)"

[tasks.test-e2e]
run = "uv run pytest tests/e2e/ -v"
description = "Run end-to-end browser tests with Playwright"

[tasks.playwright-install]
run = "uv run playwright install chromium"
description = "Install Playwright browser binaries"

[tasks.serve]
run = "uv run python web/app.py"
description = "Start the web server"
